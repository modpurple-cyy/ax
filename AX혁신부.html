<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AX혁신부</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #BBE1FA;
    --blue: #3282B8;
    --navy: #0F4C75;
    --dark: #1B262C;
    --accent: #FFD166;
    --white: #ffffff;
    --bg: #f0f7ff;
    --card: #ffffff;
    --text: #1B262C;
    --text2: #4a6378;
    --border: #d0e8f7;
    --danger: #FF6B6B;
    --success: #06D6A0;
    --radius: 16px;
    --shadow: 0 4px 20px rgba(50,130,184,0.12);
    --shadow-hover: 0 8px 32px rgba(50,130,184,0.22);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── GNB ── */
  .gnb {
    background: var(--navy);
    padding: 0 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 200;
    box-shadow: 0 2px 12px rgba(15,76,117,0.3);
  }
  .gnb-logo {
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 18px;
    color: var(--white);
    letter-spacing: -0.5px;
    cursor: pointer;
    user-select: none;
  }
  .gnb-logo span { color: var(--white); }
  .gnb-logo:hover { opacity: 0.85; }
  .gnb-nav { display: flex; gap: 4px; }
  .gnb-btn {
    padding: 7px 14px;
    border-radius: 10px;
    border: none;
    background: transparent;
    color: rgba(255,255,255,0.7);
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 6px;
  }
  .gnb-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
  .gnb-btn.active { background: var(--blue); color: #fff; }
  .gnb-btn .icon { font-size: 15px; }

  /* ── PAGES ── */
  .page { display: none; flex: 1; padding: 20px; max-width: 900px; margin: 0 auto; width: 100%; }
  .page.active { display: block; }

  /* ── DASHBOARD ── */
  .dash-greeting {
    background: linear-gradient(135deg, var(--navy) 0%, var(--blue) 100%);
    border-radius: var(--radius);
    padding: 28px 28px 24px;
    color: white;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }
  .dash-greeting::after {
    content: '';
    position: absolute;
    right: -20px; top: -20px;
    width: 140px; height: 140px;
    border-radius: 50%;
    background: rgba(187,225,250,0.15);
  }
  .dash-greeting::before {
    content: '';
    position: absolute;
    right: 40px; top: 40px;
    width: 80px; height: 80px;
    border-radius: 50%;
    background: rgba(187,225,250,0.1);
  }
  .dash-greeting h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  .dash-greeting p { font-size: 13px; opacity: 0.8; }
  .dash-date { font-size: 12px; opacity: 0.6; margin-top: 16px; }

  .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
  .stat-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 18px;
    border: 1.5px solid var(--border);
    transition: all 0.2s;
  }
  .stat-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }
  .stat-icon { font-size: 22px; margin-bottom: 8px; }
  .stat-num { font-family: 'Nunito', sans-serif; font-size: 28px; font-weight: 800; color: var(--blue); }
  .stat-label { font-size: 12px; color: var(--text2); margin-top: 2px; }

  .dash-section-title {
    font-size: 14px; font-weight: 700; color: var(--navy);
    margin: 20px 0 10px;
    display: flex; align-items: center; gap: 6px;
  }
  .dash-section-title::before {
    content: ''; display: inline-block;
    width: 4px; height: 16px;
    background: var(--blue); border-radius: 2px;
  }

  /* ── CARDS ── */
  .event-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 16px 18px;
    border: 1.5px solid var(--border);
    margin-bottom: 10px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .event-card:hover { box-shadow: var(--shadow); border-color: var(--blue); transform: translateY(-1px); }
  .event-dot {
    width: 12px; height: 12px; border-radius: 50%;
    flex-shrink: 0; margin-top: 4px;
  }
  .dot-meeting { background: var(--blue); }
  .dot-trip { background: var(--success); }
  .dot-phone { background: var(--accent); }
  .event-body { flex: 1; }
  .event-title { font-size: 14px; font-weight: 700; color: var(--dark); }
  .event-meta { font-size: 12px; color: var(--text2); margin-top: 4px; display: flex; flex-wrap: wrap; gap: 10px; }
  .event-meta span { display: flex; align-items: center; gap: 3px; }
  .badge {
    padding: 3px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 700;
    flex-shrink: 0;
  }
  .badge-meeting { background: #ddeeff; color: var(--navy); }
  .badge-trip { background: #d0f7ed; color: #05a07a; }
  .badge-phone { background: #fff5d6; color: #b8860b; }
  .badge-done { background: #e8ffe8; color: #2d7a2d; }
  .badge-pending { background: #fff0e0; color: #c06000; }

  /* ── FAB ── */
  .fab {
    position: fixed;
    bottom: 24px; right: 24px;
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--blue);
    color: white;
    border: none;
    font-size: 26px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(50,130,184,0.4);
    z-index: 150;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .fab:hover { background: var(--navy); transform: scale(1.08); }

  /* ── SECTION HEADER ── */
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .section-h1 { font-size: 18px; font-weight: 700; color: var(--dark); }
  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip {
    padding: 5px 14px; border-radius: 20px;
    font-size: 12px; font-weight: 500;
    border: 1.5px solid var(--border);
    background: white; color: var(--text2);
    cursor: pointer; transition: all 0.15s;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .chip.on { background: var(--blue); color: white; border-color: var(--blue); }

  /* ── MODAL ── */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(15,76,117,0.35);
    z-index: 300;
    display: none;
    align-items: flex-end;
    justify-content: center;
    padding: 0;
  }
  .overlay.open { display: flex; animation: fadeIn 0.2s; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal {
    background: white;
    border-radius: 24px 24px 0 0;
    padding: 28px 24px 32px;
    width: 100%;
    max-width: 540px;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideUp 0.28s cubic-bezier(.16,1,.3,1);
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

  .modal-handle {
    width: 40px; height: 4px;
    background: #ddd; border-radius: 2px;
    margin: 0 auto 20px;
  }
  .modal-title { font-size: 18px; font-weight: 700; color: var(--dark); margin-bottom: 20px; }

  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 12px; font-weight: 700; color: var(--navy); margin-bottom: 7px; display: block; }
  .form-input {
    width: 100%; padding: 11px 14px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--dark);
    background: var(--bg);
    transition: border-color 0.15s;
    outline: none;
  }
  .form-input:focus { border-color: var(--blue); background: white; }
  textarea.form-input { resize: vertical; min-height: 72px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .type-row { display: flex; gap: 8px; }
  .type-opt {
    flex: 1; padding: 10px;
    border: 2px solid var(--border);
    border-radius: 12px;
    text-align: center;
    font-size: 13px; font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text2);
    background: var(--bg);
    font-family: 'Noto Sans KR', sans-serif;
  }
  .type-opt.on { border-color: var(--blue); background: #ddeeff; color: var(--navy); }

  .check-row {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px;
    background: #fff5d6;
    border-radius: 12px;
    border: 1.5px solid #ffe099;
    cursor: pointer;
  }
  .check-box {
    width: 22px; height: 22px; border-radius: 6px;
    border: 2px solid #ddd;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    transition: all 0.15s;
    background: white;
    flex-shrink: 0;
  }
  .check-box.checked { background: var(--success); border-color: var(--success); color: white; }
  .check-label { font-size: 13px; font-weight: 500; color: #8a6000; }

  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn-save {
    flex: 1; padding: 14px;
    background: var(--blue); color: white;
    border: none; border-radius: 14px;
    font-size: 15px; font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: background 0.15s;
  }
  .btn-save:hover { background: var(--navy); }
  .btn-cancel {
    padding: 14px 20px;
    background: var(--bg); color: var(--text2);
    border: 1.5px solid var(--border); border-radius: 14px;
    font-size: 15px; font-weight: 500;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
  }

  /* ── DELETE BTN ── */
  .del-btn {
    padding: 5px 12px;
    background: #fff0f0; color: var(--danger);
    border: 1.5px solid #ffd0d0;
    border-radius: 8px;
    font-size: 12px; cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.15s; flex-shrink: 0;
  }
  .del-btn:hover { background: var(--danger); color: white; }

  .edit-btn {
    padding: 5px 12px;
    background: #e8f4ff; color: var(--blue);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 12px; cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.15s; flex-shrink: 0;
  }
  .edit-btn:hover { background: var(--blue); color: white; }

  .empty-state {
    text-align: center; padding: 48px 24px;
    color: var(--text2); font-size: 14px;
  }
  .empty-state .emoji { font-size: 40px; margin-bottom: 12px; }

  /* ── CALENDAR ── */
  .cal-nav { display: flex; align-items: center; gap: 12px; }
  .cal-nav button {
    width: 34px; height: 34px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: white; cursor: pointer;
    font-size: 16px; font-weight: 700;
    transition: all 0.15s;
  }
  .cal-nav button:hover { background: var(--blue); color: white; border-color: var(--blue); }
  .cal-grid {
    background: white;
    border-radius: var(--radius);
    border: 1.5px solid var(--border);
    overflow: hidden;
    margin-bottom: 16px;
  }
  .cal-head {
    display: grid; grid-template-columns: repeat(7,1fr);
    background: var(--navy);
  }
  .cal-head div {
    text-align: center; padding: 10px 0;
    font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.8);
  }
  .cal-body { display: grid; grid-template-columns: repeat(7,1fr); }
  .cal-cell {
    min-height: 68px;
    padding: 6px;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  .cal-cell:nth-child(7n) { border-right: none; }
  .cal-day {
    font-size: 12px; font-weight: 700;
    width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    margin-bottom: 4px;
  }
  .cal-day.today { background: var(--blue); color: white; }
  .cal-day.sun { color: #e04444; }
  .cal-day.sat { color: var(--blue); }
  .cal-ev {
    font-size: 10px;
    padding: 2px 5px;
    border-radius: 4px;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .ev-meeting { background: #ddeeff; color: var(--navy); }
  .ev-trip { background: #d0f7ed; color: #05a07a; }
  .cal-more { font-size: 10px; color: var(--text2); }

  /* ── PHONE ── */
  .phone-card {
    background: white;
    border-radius: var(--radius);
    padding: 16px 18px;
    border: 1.5px solid var(--border);
    margin-bottom: 10px;
    transition: all 0.2s;
  }
  .phone-card:hover { box-shadow: var(--shadow); transform: translateY(-1px); }
  .phone-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
  .phone-title { font-size: 14px; font-weight: 700; color: var(--dark); }
  .phone-time { font-size: 12px; color: var(--text2); }
  .phone-content { font-size: 13px; color: var(--text2); line-height: 1.6; }
  .phone-num { font-size: 12px; color: var(--blue); margin-top: 6px; font-weight: 500; }

  @media (max-width: 600px) {
    .stat-grid { grid-template-columns: repeat(3,1fr); gap: 8px; }
    .stat-num { font-size: 22px; }
    .gnb-btn span:not(.icon) { display: none; }
    .gnb-btn { padding: 7px 10px; }
    .form-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- GNB -->
<nav class="gnb">
  <div class="gnb-logo" onclick="goHome()">KASFO <span>AX혁신부</span></div>
  <div class="gnb-nav">
    <button class="gnb-btn" id="nav-schedule" onclick="goPage('schedule',this)"><span class="icon">📅</span><span>일정</span></button>
    <button class="gnb-btn" id="nav-phone" onclick="goPage('phone',this)"><span class="icon">📞</span><span>전화</span></button>
    <button class="gnb-btn" id="nav-erp" onclick="goPage('erp',this)"><span class="icon">🎓</span><span>대학</span></button>
  </div>
</nav>

<!-- DASHBOARD -->
<div class="page active" id="page-dash">
  <div class="dash-greeting">
    <h2>안녕하세요, AX혁신부! 👋</h2>
    <p>오늘도 활기차게 시작해봐요</p>
    <div class="dash-date" id="dash-date"></div>
  </div>

  <div class="stat-grid">
    <div class="stat-card" onclick="goPageFromDash('schedule','meeting')" style="cursor:pointer;">
      <div class="stat-icon">📅</div>
      <div class="stat-num" id="s-meeting">0</div>
      <div class="stat-label">이번달 회의</div>
    </div>
    <div class="stat-card" onclick="goPageFromDash('schedule','trip')" style="cursor:pointer;">
      <div class="stat-icon">🚗</div>
      <div class="stat-num" id="s-trip">0</div>
      <div class="stat-label">이번달 출장</div>
    </div>
    <div class="stat-card" onclick="goPageFromDash('phone','')" style="cursor:pointer;">
      <div class="stat-icon">📞</div>
      <div class="stat-num" id="s-phone">0</div>
      <div class="stat-label">전화 기록(부재자)</div>
    </div>
  </div>

  <div class="dash-section-title">오늘의 일정</div>
  <div id="dash-today"></div>

  <div class="dash-section-title">이번 주 일정</div>
  <div id="dash-week"></div>
</div>

<!-- SCHEDULE -->
<div class="page" id="page-schedule">
  <div class="section-header" style="margin-bottom:16px;">
    <div>
      <div class="section-h1">일정 관리</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
      <button class="chip on" id="view-list-btn" onclick="setSchedView('list')">목록</button>
      <button class="chip" id="view-cal-btn" onclick="setSchedView('cal')">캘린더</button>
    </div>
  </div>

  <div id="sched-list-view">
    <div class="filter-row" style="margin-bottom:14px;">
      <button class="chip on" onclick="setFilter('all',this)">전체</button>
      <button class="chip" onclick="setFilter('meeting',this)">회의</button>
      <button class="chip" onclick="setFilter('trip',this)">출장</button>
    </div>
    <div id="event-list"></div>
  </div>

  <div id="sched-cal-view" style="display:none;">
    <div class="section-header" style="margin-bottom:12px;">
      <div class="cal-nav">
        <button onclick="changeMonth(-1)">‹</button>
        <span style="font-size:16px;font-weight:700;color:var(--dark);" id="cal-month-label"></span>
        <button onclick="changeMonth(1)">›</button>
      </div>
    </div>
    <div class="cal-grid">
      <div class="cal-head">
        <div style="color:#ff8888;">일</div><div>월</div><div>화</div>
        <div>수</div><div>목</div><div>금</div><div style="color:#aaddff;">토</div>
      </div>
      <div class="cal-body" id="cal-body"></div>
    </div>
  </div>
</div>

<!-- PHONE -->
<div class="page" id="page-phone">
  <div class="section-header" style="margin-bottom:16px;">
    <div class="section-h1">전화 기록(부재자)</div>
  </div>
  <div id="phone-list"></div>
</div>

<!-- ERP -->
<div class="page" id="page-erp">
  <div class="section-header" style="margin-bottom:16px;">
    <div class="section-h1">U-ERP 대학 목록<span style="font-size:13px;font-weight:400;color:var(--text2);margin-left:8px;">(의견 받아 수정예정)</span></div>
    <div style="display:flex;gap:6px;">
      <button class="chip on" id="erp-tab-list" onclick="setErpTab('list')">목록</button>
      <button class="chip" id="erp-tab-stat" onclick="setErpTab('stat')">통계</button>
    </div>
  </div>

  <!-- 등록 폼 -->
  <div style="background:white;border-radius:var(--radius);border:1.5px solid var(--border);padding:20px;margin-bottom:14px;">
    <div style="font-size:13px;font-weight:700;color:var(--navy);margin-bottom:14px;">📋 대학교 등록</div>
    <div class="form-row" style="margin-bottom:10px;">
      <div>
        <label class="form-label">대학교명 *</label>
        <input class="form-input" id="erp-name" placeholder="예: 한국대학교">
      </div>
      <div>
        <label class="form-label">지역 *</label>
        <select class="form-input" id="erp-region">
          <option value="">선택</option>
          <option>서울</option><option>경기</option><option>인천</option>
          <option>부산</option><option>대구</option><option>광주</option>
          <option>대전</option><option>울산</option><option>세종</option>
          <option>강원</option><option>충북</option><option>충남</option>
          <option>전북</option><option>전남</option><option>경북</option>
          <option>경남</option><option>제주</option>
        </select>
      </div>
    </div>
    <div style="margin-bottom:10px;">
      <label class="form-label">사용 서비스 (복수 선택 가능)</label>
      <div style="display:flex;flex-wrap:wrap;gap:8px;">
        <label style="display:flex;align-items:center;gap:6px;padding:8px 14px;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;font-size:13px;background:var(--bg);" id="lbl-budget">
          <input type="checkbox" value="예산회계" id="svc-budget" onchange="styleErpCheck('budget')" style="display:none;"> 💰 예산회계
        </label>
        <label style="display:flex;align-items:center;gap:6px;padding:8px 14px;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;font-size:13px;background:var(--bg);" id="lbl-approval">
          <input type="checkbox" value="전자결재" id="svc-approval" onchange="styleErpCheck('approval')" style="display:none;"> ✍️ 전자결재
        </label>
        <label style="display:flex;align-items:center;gap:6px;padding:8px 14px;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;font-size:13px;background:var(--bg);" id="lbl-mobile">
          <input type="checkbox" value="모바일 전자결재" id="svc-mobile" onchange="styleErpCheck('mobile')" style="display:none;"> 📱 모바일 전자결재
        </label>

// ── date helpers ──
function today() { return new Date().toISOString().split('T')[0]; }
function fmtDate(d) {
  const dt = new Date(d+'T00:00:00');
  const wd = ['일','월','화','수','목','금','토'][dt.getDay()];
  return `${dt.getMonth()+1}/${dt.getDate()}(${wd})`;
}
function thisMonthEvents(type) {
  const now = new Date(); const m=now.getMonth(), y=now.getFullYear();
  return events.filter(e=>{const d=new Date(e.date+'T00:00:00');return d.getMonth()===m&&d.getFullYear()===y&&e.type===type;}).length;
}
function weekRange() {
  const now=new Date(); const d=now.getDay();
  const mon=new Date(now); mon.setDate(now.getDate()-d+1);
  const sun=new Date(mon); sun.setDate(mon.getDate()+6);
  return [mon,sun];
}

// ── DASHBOARD ──
function renderDash() {
  const now = new Date();
  document.getElementById('dash-date').textContent =
    `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 ${['일','월','화','수','목','금','토'][now.getDay()]}요일`;
  document.getElementById('s-meeting').textContent = thisMonthEvents('meeting');
  document.getElementById('s-trip').textContent    = thisMonthEvents('trip');
  document.getElementById('s-phone').textContent   = phones.length;

  const td = today();
  const todayEvs = events.filter(e=>e.date===td).sort((a,b)=>a.time.localeCompare(b.time));
  const todayEl  = document.getElementById('dash-today');
  todayEl.innerHTML = todayEvs.length ? todayEvs.map(evCard).join('') :
    '<div class="empty-state"><div class="emoji">☀️</div><div>오늘 일정이 없어요</div></div>';

  const [mon,sun] = weekRange();
  const weekEvs = events.filter(e=>{const d=new Date(e.date+'T00:00:00');return d>=mon&&d<=sun;})
    .sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
  const weekEl = document.getElementById('dash-week');
  weekEl.innerHTML = weekEvs.length ? weekEvs.map(evCard).join('') :
    '<div class="empty-state"><div class="emoji">📭</div><div>이번 주 일정이 없어요</div></div>';
}

function evCard(e, actions=false) {
  const reportBadge = e.type==='trip'
    ? `<span class="badge ${e.reportDone?'badge-done':'badge-pending'}">${e.reportDone?'보고완료':'보고미완'}</span>` : '';
  const reportBtn = e.type==='trip' && !e.reportDone
    ? `<button class="edit-btn" style="background:#e8fff4;color:#05a07a;border-color:#a0e8cf;" onclick="markReportDone('${e.id}');event.stopPropagation()">✅ 결과보고 작성 완료</button>` : '';
  return `<div class="event-card">
    <div class="event-dot dot-${e.type}"></div>
    <div class="event-body">
      <div class="event-title">${e.title}</div>
      <div class="event-meta">
        <span>📅 ${fmtDate(e.date)}</span>
        ${e.time?`<span>🕐 ${e.time}</span>`:''}
        ${e.location?`<span>📍 ${e.location}</span>`:''}
        ${e.people?`<span>👥 ${e.people}</span>`:''}
      </div>
      ${e.memo?`<div style="font-size:12px;color:var(--text2);margin-top:6px;">📝 ${e.memo}</div>`:''}
      ${reportBtn?`<div style="margin-top:8px;">${reportBtn}</div>`:''}
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
      <span class="badge badge-${e.type}">${e.type==='meeting'?'회의':'출장'}</span>
      ${reportBadge}
      <div style="display:flex;gap:4px;">
        <button class="edit-btn" onclick="editEvent('${e.id}');event.stopPropagation()">수정</button>
        <button class="del-btn" onclick="deleteEvent('${e.id}');event.stopPropagation()">삭제</button>
      </div>
    </div>
  </div>`;
}

// ── SCHEDULE LIST ──
function renderList() {
  const filtered = filter==='all' ? events : events.filter(e=>e.type===filter);
  filtered.sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
  const el = document.getElementById('event-list');
  el.innerHTML = filtered.length ? filtered.map(e=>evCard(e,true)).join('')

}

function setFilter(f,el) {

function setSchedView(v) {

  document.getElementById('view-list-btn').classList.toggle('on', v==='list');
  document.getElementById('view-cal-btn').classList.toggle('on', v==='cal');

// ── CALENDAR ──
function renderCal() {
  const y=curMonth.getFullYear(), m=curMonth.getMonth();
  document.getElementById('cal-month-label').textContent = `${y}년 ${m+1}월`;
  const first=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();
  const td=today();
  let html='';
  for(let i=0;i<first;i++) html+=`<div class="cal-cell" style="background:#fafafa;"></div>`;
  for(let d=1;d<=days;d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow=(first+d-1)%7;
    const dayEvs=events.filter(e=>e.date===ds);
    const cls=ds===td?'today':dow===0?'sun':dow===6?'sat':'';
    html+=`<div class="cal-cell">
      <div class="cal-day ${cls}">${d}</div>
      ${dayEvs.slice(0,2).map(e=>`<div class="cal-ev ev-${e.type}">${e.title}</div>`).join('')}
      ${dayEvs.length>2?`<div class="cal-more">+${dayEvs.length-2}개</div>`:''}
    </div>`;
  }
  document.getElementById('cal-body').innerHTML=html;
}
function changeMonth(d){ curMonth.setMonth(curMonth.getMonth()+d); renderCal(); }

  modalMode='phone'; editId=null;

function editEvent(id) {
  const e=events.find(x=>x.id===id); if(!e) return;
  modalMode='schedule'; editId=id; reportDone=e.reportDone||false;
  document.getElementById('modal-title').textContent='일정 수정';
  document.getElementById('form-schedule').style.display='';
  document.getElementById('form-phone').style.display='none';
  document.getElementById('f-title').value=e.title;
  document.getElementById('f-date').value=e.date;
  document.getElementById('f-time').value=e.time||'';
  document.getElementById('f-location').value=e.location||'';
  document.getElementById('f-people').value=e.people||'';
  document.getElementById('f-memo').value=e.memo||'';
  selType(e.type);
  updateReportCheck();
  document.getElementById('overlay').classList.add('open');
}

function deleteEvent(id) {
  if(!confirm('이 일정을 삭제할까요?')) return;
  events=events.filter(e=>e.id!==id); save(); renderList(); renderDash();
}

function markReportDone(id) {
  const i=events.findIndex(x=>x.id===id); if(i<0) return;
  events[i].reportDone=true; save(); renderList(); renderDash();
}

function selType(t) {
  curType=t;
  document.getElementById('t-meeting').classList.toggle('on',t==='meeting');
  document.getElementById('t-trip').classList.toggle('on',t==='trip');
  // 결과보고 상태 토글은 수정 모드(editId 있을 때)의 출장에만 표시
  document.getElementById('trip-extra').style.display=(t==='trip'&&editId)?'':'none';
  updateReportCheck();
}

function toggleReport() {
  reportDone=!reportDone; updateReportCheck();
}
function updateReportCheck() {
  const el=document.getElementById('report-check');
  const lbl=document.getElementById('report-label');
  const row=document.getElementById('report-row');
  if(el) { el.classList.toggle('checked',reportDone); el.textContent=reportDone?'✓':''; }
  if(lbl) { lbl.textContent=reportDone?'결과보고 완료 취소 (클릭 시 미완료로 변경)':'결과보고 작성 완료로 표시'; }
  if(row) { row.style.background=reportDone?'#e8fff4':'#fff5d6'; row.style.borderColor=reportDone?'#a0e8cf':'#ffe099'; }
}

function saveItem() {
  if(modalMode==='phone') { savePhone(); return; }
  const title=document.getElementById('f-title').value.trim();
  const date=document.getElementById('f-date').value;
  if(!title||!date){ alert('제목과 날짜는 필수입니다.'); return; }
  const item={
    id: editId||Date.now().toString(),
    type: curType,
    title, date,
    time: document.getElementById('f-time').value,
    location: document.getElementById('f-location').value,
    people: document.getElementById('f-people').value,
    memo: document.getElementById('f-memo').value,
    reportDone: curType==='trip'?(editId?reportDone:false):undefined
  };
  if(editId) { const i=events.findIndex(x=>x.id===editId); events[i]=item; }
  else events.push(item);
  save(); closeModal(); renderList(); renderDash();
  if(document.getElementById('sched-cal-view').style.display!=='none') renderCal();
}

// ── PHONES ──
function savePhone() {
  const title=document.getElementById('p-title').value.trim();
  const date=document.getElementById('p-date').value;
  if(!title||!date){ alert('용건과 날짜는 필수입니다.'); return; }
  phones.push({
    id: Date.now().toString(),
    title, date,
    time: document.getElementById('p-time').value,
    num: document.getElementById('p-num').value,
    content: document.getElementById('p-content').value
  });
  save(); closeModal(); renderPhones(); renderDash();
}

function renderPhones() {
  const el=document.getElementById('phone-list');
  if(!phones.length){
    el.innerHTML='<div class="empty-state"><div class="emoji">📞</div><div>전화 기록이 없어요</div></div>'; return;
  }
  const sorted=[...phones].sort((a,b)=>b.date.localeCompare(a.date)||b.time.localeCompare(a.time));
  el.innerHTML=sorted.map(p=>`<div class="phone-card">
    <div class="phone-header">
      <div>
        <div class="phone-title">${p.title}</div>
        <div class="phone-time">📅 ${fmtDate(p.date)} ${p.time?'🕐 '+p.time:''}</div>
      </div>
      <button class="del-btn" onclick="deletePhone('${p.id}')">삭제</button>
    </div>
    ${p.content?`<div class="phone-content">${p.content}</div>`:''}
    ${p.num?`<div class="phone-num">📱 ${p.num}</div>`:''}
  </div>`).join('');
}

function deletePhone(id){
  if(!confirm('삭제할까요?')) return;
  phones=phones.filter(p=>p.id!==id); save(); renderPhones(); renderDash();
}

// ── ERP ──
const SVC_KEYS = ['budget','approval','mobile','hr','research'];
const SVC_LABELS = {budget:'예산회계', approval:'전자결재', mobile:'모바일 전자결재', hr:'인사급여', research:'연구행정'};
const SVC_ICONS  = {budget:'💰', approval:'✍️', mobile:'📱', hr:'👤', research:'🔬'};

function styleErpCheck(key) {
  const cb = document.getElementById('svc-'+key);
  const lbl = document.getElementById('lbl-'+key);
  if(cb.checked) {
    lbl.style.background='#ddeeff'; lbl.style.borderColor='var(--blue)'; lbl.style.color='var(--navy)';
  } else {
    lbl.style.background='var(--bg)'; lbl.style.borderColor='var(--border)'; lbl.style.color='';
  }
}

function resetErpForm() {
  document.getElementById('erp-name').value='';
  document.getElementById('erp-region').value='';
  document.getElementById('erp-startdate').value='';
  SVC_KEYS.forEach(k=>{ document.getElementById('svc-'+k).checked=false; styleErpCheck(k); });
}

function addErp(){
  const name=document.getElementById('erp-name').value.trim();
  const region=document.getElementById('erp-region').value;
  if(!name){ alert('대학교명을 입력하세요.'); return; }
  const services = SVC_KEYS.filter(k=>document.getElementById('svc-'+k).checked).map(k=>SVC_LABELS[k]);
  const startdate = document.getElementById('erp-startdate').value;
  erps.push({id:Date.now().toString(), name, region, services, startdate, regdate:today()});
  save(); resetErpForm(); renderErps(); renderErpStats();
}

function deleteErp(id){
  if(!confirm('삭제할까요?')) return;
  erps=erps.filter(e=>e.id!==id); save(); renderErps(); renderErpStats();
}

function setErpTab(tab) {
  document.getElementById('erp-tab-list-view').style.display = tab==='list'?'':'none';
  document.getElementById('erp-tab-stat-view').style.display = tab==='stat'?'':'none';
  document.getElementById('erp-tab-list').classList.toggle('on', tab==='list');
  document.getElementById('erp-tab-stat').classList.toggle('on', tab==='stat');
  if(tab==='stat') renderErpStats();
}

function renderErps(){
  const el=document.getElementById('erp-list');
  if(!erps.length){
    el.innerHTML='<div class="empty-state"><div class="emoji">🎓</div><div>등록된 대학이 없어요</div></div>'; return;
  }
  el.innerHTML=erps.map(e=>`<div class="phone-card">
    <div style="display:flex;align-items:flex-start;gap:12px;">
      <div style="width:40px;height:40px;border-radius:12px;background:var(--sky);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;">🎓</div>
      <div style="flex:1;">
        <div style="font-weight:700;font-size:15px;color:var(--dark);">${e.name}</div>
        <div style="font-size:12px;color:var(--text2);margin-top:2px;">
          ${e.region?`📍 ${e.region}`:''}
          ${e.startdate?` &nbsp;|&nbsp; 🗓 도입일: ${fmtDate(e.startdate)}`:''}
        </div>
        ${e.services&&e.services.length?`<div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;">
          ${e.services.map(s=>`<span style="padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;background:#ddeeff;color:var(--navy);">${s}</span>`).join('')}
        </div>`:'<div style="font-size:12px;color:var(--text2);margin-top:6px;">서비스 미선택</div>'}
      </div>
      <button class="del-btn" onclick="deleteErp('${e.id}')">삭제</button>
    </div>
  </div>`).join('');
}

function renderErpStats() {
  // 지역별
  const regionMap = {};
  erps.forEach(e=>{ if(e.region){ regionMap[e.region]=(regionMap[e.region]||0)+1; } });
  const regionEl = document.getElementById('stat-region');
  if(!Object.keys(regionMap).length){ regionEl.innerHTML='<div style="font-size:13px;color:var(--text2);">데이터 없음</div>'; }
  else {
    const max = Math.max(...Object.values(regionMap));
    regionEl.innerHTML = Object.entries(regionMap).sort((a,b)=>b[1]-a[1]).map(([r,c])=>`
      <div style="margin-bottom:10px;">
        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;">
          <span style="font-weight:500;">${r}</span><span style="color:var(--blue);font-weight:700;">${c}개</span>
        </div>
        <div style="height:8px;background:var(--border);border-radius:4px;overflow:hidden;">
          <div style="height:100%;width:${Math.round(c/max*100)}%;background:var(--blue);border-radius:4px;transition:width 0.4s;"></div>
        </div>
      </div>`).join('');
  }

  // 서비스별
  const svcMap = {예산회계:0, 전자결재:0, '모바일 전자결재':0, 인사급여:0, 연구행정:0};
  erps.forEach(e=>{ (e.services||[]).forEach(s=>{ if(svcMap[s]!==undefined) svcMap[s]++; }); });
  const svcEl = document.getElementById('stat-service');
  const svcMax = Math.max(...Object.values(svcMap), 1);
  svcEl.innerHTML = Object.entries(svcMap).map(([s,c])=>`
    <div style="margin-bottom:10px;">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;">
        <span style="font-weight:500;">${s}</span><span style="color:var(--blue);font-weight:700;">${c}개</span>
      </div>
      <div style="height:8px;background:var(--border);border-radius:4px;overflow:hidden;">
        <div style="height:100%;width:${Math.round(c/svcMax*100)}%;background:var(--success);border-radius:4px;transition:width 0.4s;"></div>
      </div>
    </div>`).join('');

  // 전체
  document.getElementById('stat-total').innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px;">
      <div style="background:var(--bg);border-radius:12px;padding:14px;text-align:center;">
        <div style="font-size:22px;font-weight:800;color:var(--blue);font-family:'Nunito',sans-serif;">${erps.length}</div>
        <div style="font-size:12px;color:var(--text2);">전체 대학</div>
      </div>
      <div style="background:var(--bg);border-radius:12px;padding:14px;text-align:center;">
        <div style="font-size:22px;font-weight:800;color:var(--blue);font-family:'Nunito',sans-serif;">${Object.keys(regionMap).length}</div>
        <div style="font-size:12px;color:var(--text2);">등록 지역</div>
      </div>
      <div style="background:var(--bg);border-radius:12px;padding:14px;text-align:center;">
        <div style="font-size:22px;font-weight:800;color:var(--blue);font-family:'Nunito',sans-serif;">${Object.values(svcMap).reduce((a,b)=>a+b,0)}</div>
        <div style="font-size:12px;color:var(--text2);">서비스 총 도입</div>
      </div>
    </div>`;
}

// ── MODAL CLOSE ──
function closeModal() { document.getElementById('overlay').classList.remove('open'); }
function closeOverlay(e) { if(e.target.id==='overlay') closeModal(); }

// ── INIT ──
renderDash();
document.getElementById('fab').onclick = openModal;
</script>
</body>
</html>
